<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
  maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover,
  interactive-widget=resizes-content">
  <title>DeepWire NX</title>
  
  <meta name="theme-color" content="#000000">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DeepWire NX">
  
  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="src/style.css">
  <link rel="icon"  href="src/icon-192.png">
  <link rel="apple-touch-icon"  href="src/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "fbcbc6a0-8e00-4bd6-b389-c2fc6676ece2",
        safari_web_id: "",
        serviceWorkerPath: "OneSignalSDKWorker.js", 
        notifyButton: { enable: true },
        allowLocalhostAsSecureOrigin: true,
      });
    });
  </script>

</head>

<body>
  <div id="app-container">
    <div id="transition-overlay" class="transition-overlay active">
      <img src="chat-app-icon-t.png" class="transition-padlock"></img>
    </div>

    <div id="login-screen" class="screen active">
      <div class="login-card">
        <h1>DeepWire NX</h1>
        <p>Enter a Secret PIN to join a secure, encrypted cloud room.</p>
        <div class="input-group">
          <input type="search" id="pin_input" placeholder="E.g. 1234-5678" 
          autocomplete="off" autocorrect="off" autocapitalize="off"
          spellcheck="false" data-lpignore="true">
          <button id="connect-btn" >Connect</button>
        </div>
        <p id="status-text"></p>
      </div>
    </div>

    <div id="room-list-screen" class="screen">
  
      <div class="room-list-header">
        <h2 class="room-list-title">DeepWire NX</h2>
        
        <button id="btn-global-options" class="header-icon-btn" >
          <ion-icon name="ellipsis-vertical"></ion-icon>
        </button>
   
      </div>
    
      <div class="room-list-body" id="room-list-container"></div>

      <div id="global-options-overlay" class="new-room-overlay">
        <div class="action-menu" id="global-action-menu">
          <div class="action-menu-header" id="global-menu-header">
            <span>App Settings</span>
          </div>
          <button id="btn-global-theme" class="action-item theme">Change Theme</button>
          <button id="btn-global-autodownload" class="action-item">
            <span id="autodownload-text">Auto Download: None</span>
          </button>
          <button id="btn-global-wipe" class="action-item danger">Wipe All Data</button>
          <div class="action-menu-divider"></div>
        </div>
      </div>
    
      <div id="new-room-overlay" class="new-room-overlay">
        <div class="new-room-modal">
          <div class="input-container">
            <input type="search" id="overlay_room_pin" placeholder="E.g. 1234-5678" autocomplete="off">
            <button id="overlay-connect-btn" class="overlay-attach-btn">
              <ion-icon name="enter"></ion-icon>
            </button>
          </div>

          <div id="overlay-status"></div>
        </div>
      </div>
      
      <div id="room-options-overlay" class="new-room-overlay">
        <div class="action-menu">

          <div class="action-menu-header">
            <span id="options-room-title">Room Options</span>
          </div>

          <button id="btn-custom-name" class="action-item">Custom Name</button>
          <button id="btn-lock-room" class="action-item">Lock Room</button>
          <button id="btn-remove-room" class="action-item danger">Remove Room</button>

          <div class="action-menu-divider"></div>

        </div>
      </div>

      <button id="add-room-btn" class="icon-btn-add">
        <ion-icon name="add"></ion-icon>
      </button>
    </div>

    <div id="chat-screen" class="screen">
      <div class="chat-header">
        <div class="header-info">
          <h3>DeepWire NX<ion-icon name="lock-closed"></ion-icon></h3>
        </div>
      </div>
  
      <div id="chat-messages"></div>

      <div id="attachment-panel">

        <div id="panel-bomb-toggle" class="panel-bomb-toggle">
          <span class="panel-bomb-text">Self-Destructing Data</span>
          <ion-icon id="panel-bomb-icon" class="panel-bomb-icon" name="radio-button-off"></ion-icon>
        </div>
        
        <input type="file" id="image_input_gallery" accept="image/*" style="display: none;">
        <input type="file" id="image_input_camera" accept="image/*" capture="environment" style="display: none;">
        <input type="file" id="doc_input" accept=".pdf,.doc,.docx,.txt,.zip" style="display: none;">
        
        <div class="attach-item" id="btn-gallery">
          <div class="icon-circle"><ion-icon name="image"></ion-icon></div>
        </div>
        <div class="attach-item" id="btn-camera">
          <div class="icon-circle"><ion-icon name="camera"></ion-icon></div>
        </div>
        <div class="attach-item" id="btn-location">
          <div class="icon-circle"><ion-icon name="location"></ion-icon></div>
        </div>     
        <div class="attach-item" id="btn-document">
          <div class="icon-circle"><ion-icon name="document-text"></ion-icon></div>
        </div>
      </div>

      <div class="chat-input-area"> 
        <div class="input-container">
          <input type="search" id="message_input" placeholder="Type a message..." 
          autocomplete="off" autocorrect="off" autocapitalize="off"
          spellcheck="false" data-lpignore="true">

          <button id="attach-btn" aria-label="add">
            <ion-icon name="add"></ion-icon>
          </button>
        </div>
        <button id="send-btn" style="display: none;">
          <ion-icon name="send"></ion-icon>
        </button>
        <button id="record-btn">
          <ion-icon name="mic"></ion-icon>
        </button>
      </div>

      <div id="msg-options-overlay" class="new-room-overlay">
        <div class="action-menu" style=" width: 220px;">
          <button id="btn-report-msg" class="action-item danger" style="border-bottom:1px solid var(--border-color) ;">Report Message</button>
          <button id="btn-ban-sender" class="action-item danger" style="border-bottom:1px solid var(--border-color) ;">Block Sender</button>
          <button id="btn-delete-msg" class="action-item danger">Delete Message</button>
        </div>
      </div>
    </div>

    <div id="viewer-screen" class="screen">
      <div class="chat-header">
        <h3 id="viewer-filename">Foto</h3>
        <div class="viewer-btn-container">
          <button id="download-viewer-btn" class="viewer-btn">
            <ion-icon name="download"></ion-icon>
          </button>
          <button id="close-viewer-btn" class="viewer-btn">
            <ion-icon name="close"></ion-icon>
          </button>
          <div class="header-spacer"></div>
        </div>
      </div>
      
      <div id="viewer-content">
        <img id="viewer-image" src="">
      </div>
    </div>

  </div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
